name: autohut
description: AutoHut - Car Parts Stock Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.19.0
  uuid: ^4.4.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  pdf: ^3.10.8
  printing: ^5.13.1
  video_player: ^2.8.6
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  supabase_flutter: ^2.8.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:             # ← ဒါ ထည့်
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2B5BA8"   # ← Logo background color (blue)
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
